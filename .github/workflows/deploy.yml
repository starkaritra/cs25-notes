name: Deploy notes to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'notes/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; skip queued runs in favor of the latest.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Turn on Pages (source = GitHub Actions) automatically on first run,
          # so no manual toggle in repo Settings is required.
          enablement: true

      - name: Upload notes/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: notes

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
